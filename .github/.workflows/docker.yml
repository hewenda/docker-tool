strategy:
  matrix:
    include:
      - name: tool
        context: ./base-tool
        dockerfile: ./base-tool/Dockerfile
      - name: gophernotes
        context: ./gophernotes
        dockerfile: ./gophernotes/Dockerfile

steps:
  - uses: actions/checkout@v4

  - uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - uses: docker/build-push-action@v5
    with:
      context: ${{ matrix.context }}
      file: ${{ matrix.dockerfile }}
      push: true
      tags: foxesin/${{ matrix.name }}:latest